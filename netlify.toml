[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  VITE_API_URL = "/api"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Proxy API requests to the backend.
[[redirects]]
  from = "/api/*"
  to = "https://your-backend-url.com/:splat"
  status = 200
  force = true

# Ensure the SPA shell is never cached by browsers/CDN.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# Hashed assets are immutable and can be cached long-term.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
