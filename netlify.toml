[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  VITE_API_URL = "/api"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Proxy API requests to the backend.
# Replace https://your-backend-url.com with your actual backend host.
[[redirects]]
  from = "/api/*"
  to = "https://your-backend-url.com/:splat"
  status = 200
  force = true
